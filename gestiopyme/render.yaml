services:
  # Base de datos PostgreSQL alojada en Render
  - type: pgo
    name: gestiopyme-db
    databaseName: gestiopyme
    user: gestiopyme_user
    plan: free

  # Backend de Express
  - type: web
    name: gestiopyme-backend
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestiopyme-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        # Reemplaza esto con tu URL real de Netlify cuando se despliegue
        value: https://tu-sitio-netlify.netlify.app
