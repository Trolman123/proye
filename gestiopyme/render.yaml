databases:
  # Base de datos PostgreSQL alojada en Render
  - name: gestiopyme-db
    databaseName: gestiopyme
    user: gestiopyme_user
    plan: free

services:
  # Backend de Express
  - type: web
    name: gestiopyme-backend
    env: node
    plan: free
    rootDir: gestiopyme/server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestiopyme-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://cheerful-melba-85cb3b.netlify.app
